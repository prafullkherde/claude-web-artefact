<!-- ===== LIFECYCLE ===== -->

  <text x="430" y="38" text-anchor="middle" class="label-type">How the system is maintained and grows each conversation</text>

  <!-- Steps in a flow -->
  <!-- Step 1 -->
  <rect x="30" y="70" width="150" height="80" rx="8" class="container"/>
